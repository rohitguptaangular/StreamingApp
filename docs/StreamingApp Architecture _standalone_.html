  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

 U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  /* ——— Brand ——— */\n  --sf-brand-coral: #ff4757;        /* MUI primary.main — CTAs, active tab, play glow */\n  --sf-brand-coral-hover: #ff6170;  /* hover lift — synthesized 6% lighter */\n  --sf-brand-coral-press: #e03a48;  /* press state — synthesized 6% darker */\n  --sf-brand-blue: #2f80ed;         /* MUI secondary.main — info, links */\n  --sf-brand-blue-hover: #4a93f1;\n\n  /* Wordmark gradient — from Header.js Brand component */\n  --sf-brand-gradient-start: #ff7a18; /* orange */\n  --sf-brand-gradient-mid:   #af002d; /* deep red */\n  --sf-brand-gradient-end:   #319197; /* teal */\n  --sf-brand-gradient: linear-gradient(135deg, #ff7a18 0%, #af002d 50%, #319197 100%);\n\n  /* ——— Backgrounds ——— */\n  --sf-bg-app: #050505;             /* MUI background.default */\n  --sf-bg-footer: #040404;          /* deep footer */\n  --sf-bg-paper: #111111;           /* MUI background.paper — cards, menus */\n  --sf-bg-paper-2: #161616;         /* elevated surfaces / control buttons */\n  --sf-bg-paper-gradient: linear-gradient(180deg, #141414 0%, #0c0c0c 100%); /* FeatureCard */\n  --sf-bg-step-card: rgba(12,12,12,0.85); /* StepCard on LandingPage */\n\n  /* Full-page ambient glow — applied to Browse + Landing */\n  --sf-bg-ambient:\n    radial-gradient(1200px circle at 20% 0%, rgba(255,71,87,0.15), transparent 45%),\n    radial-gradient(1000px circle at 85% 5%, rgba(47,128,237,0.12), transparent 45%),\n    var(--sf-bg-app);\n\n  /* Hero radial used on Landing */\n  --sf-bg-hero:\n    radial-gradient(circle at top left, rgba(255,71,87,0.35), transparent 55%),\n    radial-gradient(circle at bottom right, rgba(47,128,237,0.45), transparent 45%),\n    #050505;\n\n  /* Cinematic scrim — placed over backdrop imagery (Hero/VideoDetails) */\n  --sf-scrim-horizontal: linear-gradient(120deg, rgba(10,10,10,0.9) 20%, rgba(10,10,10,0.4) 60%, rgba(10,10,10,0.85) 100%);\n  --sf-scrim-bottom:     linear-gradient(180deg, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.7) 80%);\n  --sf-scrim-controls-bottom: linear-gradient(0deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.0) 100%);\n  --sf-scrim-controls-top:    linear-gradient(180deg, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.0) 100%);\n\n  /* ——— Text ——— */\n  --sf-fg-primary: #f9f9f9;                      /* text.primary */\n  --sf-fg-secondary: rgba(249,249,249,0.72);     /* text.secondary */\n  --sf-fg-tertiary: rgba(255,255,255,0.65);      /* body on dark cards */\n  --sf-fg-muted:    rgba(255,255,255,0.5);       /* footer copy */\n  --sf-fg-disabled: rgba(255,255,255,0.35);\n\n  /* ——— Glass / surfaces overlaying imagery ——— */\n  --sf-glass-chip:      rgba(255,255,255,0.12);  /* chips, icon buttons on thumbnails */\n  --sf-glass-chip-hover:rgba(255,255,255,0.18);\n  --sf-glass-search:    rgba(255,255,255,0.10);  /* Header search bg */\n  --sf-glass-search-hover: rgba(255,255,255,0.18);\n  --sf-glass-control:   rgba(22,22,22,0.75);     /* carousel arrows */\n  --sf-glass-control-hover: rgba(22,22,22,0.90);\n  --sf-glass-iconbtn:   rgba(0,0,0,0.40);        /* close button on imagery */\n  --sf-glass-iconbtn-strong: rgba(0,0,0,0.55);\n\n  /* ——— Borders & dividers ——— */\n  --sf-border-hairline: 1px solid rgba(255,255,255,0.05);  /* FeatureCard */\n  --sf-border-card:     1px solid rgba(255,255,255,0.08);  /* StepCard, ChatPanel */\n  --sf-border-divider:  1px solid rgba(255,255,255,0.12);\n\n  /* ——— Semantic ——— */\n  --sf-success: #2ecc71;\n  --sf-warn: #ffa726;\n  --sf-danger: #ff4757;   /* aligns with coral */\n  --sf-info:   #2f80ed;\n\n  /* ——— Radii ——— */\n  --sf-radius-sm: 10px;\n  --sf-radius-md: 16px;    /* MUI shape.borderRadius */\n  --sf-radius-lg: 20px;    /* Card override */\n  --sf-radius-xl: 24px;    /* VideoCard (borderRadius * 1.5) */\n  --sf-radius-pill: 999px;\n\n  /* ——— Elevation (MUI default dark shadows, curated) ——— */\n  --sf-shadow-sm: 0 2px 6px rgba(0,0,0,0.25);\n  --sf-shadow-md: 0 12px 24px rgba(0,0,0,0.35);\n  --sf-shadow-lg: 0 24px 48px rgba(0,0,0,0.30);      /* FeatureCard */\n  --sf-shadow-xl: 0 32px 64px rgba(0,0,0,0.45);      /* hover lift on thumbnails */\n  --sf-shadow-glow-coral: 0 0 0 8px rgba(255,71,87,0.20);  /* slider focus */\n\n  /* ——— Spacing (MUI 8pt grid) ——— */\n  --sf-space-1: 8px;\n  --sf-space-2: 16px;\n  --sf-space-3: 24px;\n  --sf-space-4: 32px;\n  --sf-space-5: 40px;\n  --sf-space-6: 48px;\n  --sf-space-8: 64px;\n  --sf-space-10: 80px;\n\n  /* ——— Motion ——— */\n  --sf-motion-card: transform 240ms ease, box-shadow 240ms ease;\n  --sf-motion-carousel: transform 420ms ease;\n  --sf-motion-header: all 300ms ease;\n  --sf-motion-hover-fast: 200ms ease;\n\n  /* ——— Type ——— */\n  --sf-font-sans: 'Poppins', 'Segoe UI', system-ui, -apple-system, sans-serif;\n  --sf-font-mono: ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, monospace;\n\n  /* Weights actually loaded from Google Fonts: 400 500 600 700 800 */\n  --sf-weight-regular: 400;\n  --sf-weight-medium: 500;\n  --sf-weight-semibold: 600;\n  --sf-weight-bold: 700;\n  --sf-weight-black: 800;\n\n  /* Type scale — mirrors MUI h1..h6/body/caption with applied weights */\n  --sf-size-display: 72px;   /* hero headline on lg */\n  --sf-size-h1: 56px;        /* fontWeight 800 */\n  --sf-size-h2: 44px;        /* fontWeight 700 */\n  --sf-size-h3: 34px;        /* fontWeight 700 */\n  --sf-size-h4: 26px;        /* fontWeight 600 */\n  --sf-size-h5: 22px;        /* carousel row title, weight 600 */\n  --sf-size-h6: 18px;        /* feature card heading, weight 600 */\n  --sf-size-body: 16px;\n  --sf-size-body-sm: 14px;\n  --sf-size-caption: 12px;\n  --sf-size-overline: 11px;\n\n  --sf-line-tight: 1.05;     /* hero headlines */\n  --sf-line-snug: 1.1;       /* h3 in VideoDetails */\n  --sf-line-normal: 1.4;\n  --sf-line-body: 1.6;\n}\n\n/* ——— Semantic element styles ——— */\nhtml, body {\n  margin: 0;\n  font-family: var(--sf-font-sans);\n  background: var(--sf-bg-app);\n  color: var(--sf-fg-primary);\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n  text-rendering: optimizeLegibility;\n}\n\nh1 { font-size: var(--sf-size-h1); font-weight: 800; line-height: var(--sf-line-tight); letter-spacing: -0.01em; margin: 0; }\nh2 { font-size: var(--sf-size-h2); font-weight: 700; line-height: 1.08;               margin: 0; }\nh3 { font-size: var(--sf-size-h3); font-weight: 700; line-height: var(--sf-line-snug); margin: 0; }\nh4 { font-size: var(--sf-size-h4); font-weight: 600; line-height: 1.2;                margin: 0; }\nh5 { font-size: var(--sf-size-h5); font-weight: 600; line-height: 1.25;               margin: 0; }\nh6 { font-size: var(--sf-size-h6); font-weight: 600; line-height: 1.3;                margin: 0; }\n\np, .sf-body {\n  font-size: var(--sf-size-body);\n  line-height: var(--sf-line-body);\n  color: var(--sf-fg-secondary);\n  margin: 0 0 1em;\n}\n\n.sf-overline {\n  font-size: var(--sf-size-overline);\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--sf-fg-secondary);\n  font-weight: 500;\n}\n\n.sf-caption {\n  font-size: var(--sf-size-caption);\n  color: var(--sf-fg-secondary);\n}\n\n.sf-brand-wordmark {\n  font-weight: 700;\n  background: var(--sf-brand-gradient);\n  -webkit-background-clip: text;\n  background-clip: text;\n  -webkit-text-fill-color: transparent;\n  color: transparent;\n}\n\n/* reusable button tokens */\n.sf-btn-pill {\n  border-radius: var(--sf-radius-pill);\n  padding: 12px 28px;\n  font-weight: 600;\n  font-family: inherit;\n  font-size: 15px;\n  border: 1px solid transparent;\n  cursor: pointer;\n  transition: var(--sf-motion-hover-fast);\n  text-transform: none;\n  line-height: 1;\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n}\n.sf-btn-pill--primary {\n  background: var(--sf-brand-coral);\n  color: #fff;\n}\n.sf-btn-pill--primary:hover { background: var(--sf-brand-coral-hover); }\n.sf-btn-pill--primary:active { background: var(--sf-brand-coral-press); }\n.sf-btn-pill--outline {\n  background: transparent;\n  color: #fff;\n  border-color: rgba(255,255,255,0.4);\n}\n.sf-btn-pill--outline:hover { border-color: #fff; background: rgba(255,255,255,0.06); }\n\n.sf-chip {\n  display: inline-flex;\n  align-items: center;\n  gap: 6px;\n  padding: 4px 12px;\n  border-radius: var(--sf-radius-pill);\n  background: var(--sf-glass-chip);\n  color: #fff;\n  font-size: var(--sf-size-caption);\n  font-weight: 500;\n  line-height: 1.4;\n}\n.sf-chip--coral {\n  background: var(--sf-brand-coral);\n  color: #fff;\n  font-weight: 600;\n}\n<\u002Fstyle>\n<style>/* fallback */\n@font-face {\n  font-family: 'Material Icons';\n  font-style: normal;\n  font-weight: 400;\n  src: url(\"d26b79e6-d579-4613-9467-8a296be7f23d\") format('woff2');\n}\n\n.material-icons {\n  font-family: 'Material Icons';\n  font-weight: normal;\n  font-style: normal;\n  font-size: 24px;\n  line-height: 1;\n  letter-spacing: normal;\n  text-transform: none;\n  display: inline-block;\n  white-space: nowrap;\n  word-wrap: normal;\n  direction: ltr;\n  -webkit-font-feature-settings: 'liga';\n  -webkit-font-smoothing: antialiased;\n}\n<\u002Fstyle>\n<style>\n  :root{\n    --ink:#0b1220;\n    --page:#f5f7fb;\n    --card:#ffffff;\n    --line:#d6dde9;\n    --line-strong:#9aa6bc;\n    --muted:#5a657a;\n    --aws:#ff9900;\n    --aws-deep:#232f3e;\n    --k8s:#326ce5;\n    --jenkins:#d33833;\n    --github:#24292f;\n    --mongo:#00684a;\n    --coral:#ff4757;\n    --ok:#1f8a54;\n  }\n  *{box-sizing:border-box}\n  html,body{margin:0;background:var(--page);color:var(--ink);font-family:var(--sf-font-sans,'Poppins','Segoe UI',system-ui,sans-serif);-webkit-font-smoothing:antialiased;}\n  .page{max-width:1400px;margin:0 auto;padding:40px 32px 56px;}\n  header.doc{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:24px;gap:24px;flex-wrap:wrap;}\n  header.doc h1{font-size:34px;font-weight:800;letter-spacing:-0.01em;line-height:1.05;margin:0 0 6px;}\n  header.doc .sub{color:var(--muted);font-size:14px;line-height:1.5;max-width:680px;}\n  .meta{display:flex;gap:18px;flex-wrap:wrap;font-size:12px;color:var(--muted);}\n  .meta b{color:var(--ink);font-weight:600;}\n  .canvas{position:relative;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:28px;box-shadow:0 30px 60px -40px rgba(17,24,39,0.25);overflow:hidden;}\n\n  /* Layered ambient */\n  .canvas::before{content:\"\";position:absolute;inset:0;background:\n    radial-gradient(900px circle at 12% -10%, rgba(255,153,0,0.08), transparent 55%),\n    radial-gradient(900px circle at 100% 100%, rgba(50,108,229,0.07), transparent 55%);\n    pointer-events:none;}\n\n  /* Grid layout */\n  .grid{position:relative;display:grid;grid-template-columns: 180px 1fr 1fr 1fr;grid-template-rows: auto auto auto auto; gap:28px 36px;z-index:1;}\n\n  /* Zone wrappers */\n  .zone{border-radius:16px;padding:20px 18px 18px;position:relative;border:1.5px dashed var(--line-strong);}\n  .zone > .zone-label{position:absolute;top:-12px;left:14px;background:var(--card);padding:2px 10px;font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);display:inline-flex;align-items:center;gap:6px;}\n  .zone > .zone-label .dot{width:8px;height:8px;border-radius:50%;}\n  .zone.aws{border-color:#f0a732;background:linear-gradient(180deg,rgba(255,153,0,0.04),rgba(255,153,0,0));}\n  .zone.aws > .zone-label .dot{background:var(--aws);}\n  .zone.vpc{border-color:#c7d2e8;background:linear-gradient(180deg,rgba(50,108,229,0.04),rgba(50,108,229,0));}\n  .zone.vpc > .zone-label .dot{background:var(--k8s);}\n  .zone.eks{border-color:#5e8cff;background:rgba(50,108,229,0.05);}\n  .zone.eks > .zone-label{background:#eaf1ff;color:#1e3a8a;}\n  .zone.eks > .zone-label .dot{background:var(--k8s);}\n\n  /* Node cards */\n  .node{background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px 12px;display:flex;gap:10px;align-items:center;box-shadow:0 2px 6px rgba(13,17,26,0.04);position:relative;}\n  .node .ico{width:36px;height:36px;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;color:#fff;flex:none;font-size:14px;font-weight:700;letter-spacing:-0.02em;}\n  .node .body{min-width:0;}\n  .node .t{font-size:13px;font-weight:700;line-height:1.15;}\n  .node .s{font-size:11px;color:var(--muted);line-height:1.35;margin-top:2px;}\n  .node .tag{font-size:10px;color:var(--muted);font-family:var(--sf-font-mono,ui-monospace,Menlo,monospace);margin-top:2px;}\n\n  .stack{display:flex;flex-direction:column;gap:10px;}\n  .row-nodes{display:grid;grid-template-columns:1fr 1fr;gap:10px;}\n  .row-nodes.three{grid-template-columns:1fr 1fr 1fr;}\n  .row-nodes.five{grid-template-columns:repeat(5,1fr);}\n\n  /* Icon palette per service */\n  .ico.github{background:var(--github);}\n  .ico.jenkins{background:var(--jenkins);}\n  .ico.ec2{background:#ff9900;}\n  .ico.ecr{background:#2e73b8;}\n  .ico.eks{background:#326ce5;}\n  .ico.k8s{background:#326ce5;}\n  .ico.alb{background:#8c4fff;}\n  .ico.cw{background:#cc2264;}\n  .ico.sns{background:#d82c7b;}\n  .ico.iam{background:#dd344c;}\n  .ico.s3{background:#569a31;}\n  .ico.mongo{background:var(--mongo);}\n  .ico.user{background:#0b1220;}\n  .ico.fe{background:linear-gradient(135deg,#ff4757,#af002d);}\n  .ico.auth{background:#ff9900;}\n  .ico.stream{background:#8c4fff;}\n  .ico.admin{background:#0f766e;}\n  .ico.chat{background:#2f80ed;}\n\n  /* SVG wire layer */\n  .wires{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:2;overflow:visible;}\n  .wires path{fill:none;stroke-linecap:round;stroke-linejoin:round;}\n  .w-ci{stroke:#2e73b8;stroke-width:2;}\n  .w-ci-dashed{stroke:#2e73b8;stroke-width:2;stroke-dasharray:5 5;}\n  .w-user{stroke:#111827;stroke-width:2;}\n  .w-data{stroke:#326ce5;stroke-width:1.6;}\n  .w-data-dashed{stroke:#326ce5;stroke-width:1.6;stroke-dasharray:4 5;}\n  .w-monitor{stroke:#cc2264;stroke-width:1.5;stroke-dasharray:3 4;}\n  .w-notify{stroke:#d82c7b;stroke-width:1.5;stroke-dasharray:3 4;}\n\n  .wire-label{font-size:10.5px;font-weight:600;fill:#1f2937;}\n  .wire-label.muted{fill:#5a657a;font-weight:500;}\n\n  /* Placement (grid areas) */\n  .a-user{grid-column:1;grid-row:1 / span 2;}\n  .a-github{grid-column:1;grid-row:3;}\n  .a-jenkins{grid-column:2;grid-row:3;}\n  .a-ecr{grid-column:3;grid-row:3;}\n  .a-alb{grid-column:2;grid-row:1;}\n  .a-eks{grid-column:2 / span 3;grid-row:2;}\n  .a-aux{grid-column:4;grid-row:1;}\n  .a-monitor{grid-column:4;grid-row:3;}\n\n  /* Kubernetes inner structure */\n  .k8s-inner{display:grid;grid-template-columns:1.1fr 1fr;gap:20px;margin-top:6px;}\n  .k8s-col{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;}\n  .k8s-col h4{margin:0 0 10px;font-size:12px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#1e3a8a;display:flex;align-items:center;gap:8px;}\n  .k8s-col h4 .badge{background:#eaf1ff;color:#1e3a8a;padding:2px 8px;border-radius:999px;font-size:10px;letter-spacing:0.04em;}\n\n  /* Legend */\n  .legend{margin-top:22px;display:flex;flex-wrap:wrap;gap:18px 26px;font-size:12px;color:var(--muted);align-items:center;background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 18px;}\n  .legend .lg{display:inline-flex;align-items:center;gap:8px;}\n  .legend .sw{display:inline-block;width:26px;height:2px;border-radius:1px;}\n  .legend .sw.ci{background:#2e73b8;}\n  .legend .sw.ci-d{background:repeating-linear-gradient(90deg,#2e73b8 0 6px,transparent 6px 12px);height:2px;}\n  .legend .sw.user{background:#111827;}\n  .legend .sw.data{background:#326ce5;}\n  .legend .sw.mon{background:repeating-linear-gradient(90deg,#cc2264 0 4px,transparent 4px 8px);height:2px;}\n\n  /* Chip row under title */\n  .facts{display:flex;flex-wrap:wrap;gap:8px;}\n  .fact{display:inline-flex;align-items:center;gap:6px;background:#eef1f7;border:1px solid var(--line);color:#1f2937;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:600;}\n  .fact .material-icons{font-size:14px;color:var(--muted);}\n\n  /* Flow steps */\n  .steps{margin-top:24px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}\n  .step{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 16px;position:relative;overflow:hidden;}\n  .step .num{font-size:11px;font-weight:700;letter-spacing:0.08em;color:var(--k8s);}\n  .step .title{font-size:13px;font-weight:700;margin-top:4px;}\n  .step .body{font-size:11.5px;color:var(--muted);margin-top:4px;line-height:1.5;}\n  .step::before{content:\"\";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--k8s);}\n  .step.build::before{background:var(--jenkins);}\n  .step.ship::before{background:var(--aws);}\n  .step.run::before{background:var(--k8s);}\n  .step.watch::before{background:#cc2264;}\n\n  .sub-muted{font-size:11px;color:var(--muted);margin-top:4px;}\n  .foot{margin-top:18px;font-size:11px;color:var(--muted);text-align:right;}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<div class=\"page\">\n\n<header class=\"doc\">\n  <div>\n    <h1>StreamingApp — AWS Architecture<\u002Fh1>\n    <div class=\"sub\">Microservice MERN stack containerized with Docker, CI/CD via Jenkins on EC2, images in ECR, running on Amazon EKS with Helm. Observability through CloudWatch; build notifications via SNS.<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"facts\">\n    <span class=\"fact\"><span class=\"material-icons\">public<\u002Fspan>Region: ap-south-1<\u002Fspan>\n    <span class=\"fact\"><span class=\"material-icons\">account_tree<\u002Fspan>5 microservices<\u002Fspan>\n    <span class=\"fact\"><span class=\"material-icons\">layers<\u002Fspan>EKS · 2× t3.medium<\u002Fspan>\n    <span class=\"fact\"><span class=\"material-icons\">hub<\u002Fspan>Helm release<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<div class=\"canvas\">\n  <svg class=\"wires\" viewBox=\"0 0 1440 820\" preserveAspectRatio=\"none\">\n    <!-- wires are conceptual; positions are approximate to match the grid -->\n    <defs>\n      <marker id=\"arrow-ci\" markerWidth=\"8\" markerHeight=\"8\" refX=\"6\" refY=\"4\" orient=\"auto\"><path d=\"M0,0 L6,4 L0,8 z\" fill=\"#2e73b8\"><\u002Fpath><\u002Fmarker>\n      <marker id=\"arrow-user\" markerWidth=\"8\" markerHeight=\"8\" refX=\"6\" refY=\"4\" orient=\"auto\"><path d=\"M0,0 L6,4 L0,8 z\" fill=\"#111827\"><\u002Fpath><\u002Fmarker>\n      <marker id=\"arrow-data\" markerWidth=\"8\" markerHeight=\"8\" refX=\"6\" refY=\"4\" orient=\"auto\"><path d=\"M0,0 L6,4 L0,8 z\" fill=\"#326ce5\"><\u002Fpath><\u002Fmarker>\n      <marker id=\"arrow-mon\" markerWidth=\"8\" markerHeight=\"8\" refX=\"6\" refY=\"4\" orient=\"auto\"><path d=\"M0,0 L6,4 L0,8 z\" fill=\"#cc2264\"><\u002Fpath><\u002Fmarker>\n      <marker id=\"arrow-notify\" markerWidth=\"8\" markerHeight=\"8\" refX=\"6\" refY=\"4\" orient=\"auto\"><path d=\"M0,0 L6,4 L0,8 z\" fill=\"#d82c7b\"><\u002Fpath><\u002Fmarker>\n    <\u002Fdefs>\n\n    <!-- End user -> ALB -->\n    <path class=\"w-user\" d=\"M 120 130 C 240 130, 280 120, 330 120\" marker-end=\"url(#arrow-user)\"><\u002Fpath>\n    <text class=\"wire-label\" x=\"170\" y=\"115\">HTTPS · public IP / DNS<\u002Ftext>\n\n    <!-- ALB -> EKS Frontend pods -->\n    <path class=\"w-user\" d=\"M 450 155 C 450 220, 430 260, 430 310\" marker-end=\"url(#arrow-user)\"><\u002Fpath>\n    <text class=\"wire-label muted\" x=\"456\" y=\"235\">:80<\u002Ftext>\n\n    <!-- GitHub -> Jenkins (webhook) -->\n    <path class=\"w-ci\" d=\"M 170 645 C 280 645, 320 645, 360 645\" marker-end=\"url(#arrow-ci)\"><\u002Fpath>\n    <text class=\"wire-label\" x=\"200\" y=\"635\">webhook<\u002Ftext>\n\n    <!-- Jenkins -> ECR (push images) -->\n    <path class=\"w-ci\" d=\"M 560 645 C 720 645, 760 645, 820 645\" marker-end=\"url(#arrow-ci)\"><\u002Fpath>\n    <text class=\"wire-label\" x=\"640\" y=\"635\">build · tag · push<\u002Ftext>\n\n    <!-- ECR -> EKS (pull images) -->\n    <path class=\"w-ci-dashed\" d=\"M 880 605 C 880 520, 760 470, 700 440\" marker-end=\"url(#arrow-ci)\"><\u002Fpath>\n    <text class=\"wire-label\" x=\"820\" y=\"520\">image pull<\u002Ftext>\n\n    <!-- EKS -> CloudWatch (metrics/logs) -->\n    <path class=\"w-monitor\" d=\"M 1080 420 C 1190 470, 1220 560, 1220 620\" marker-end=\"url(#arrow-mon)\"><\u002Fpath>\n    <text class=\"wire-label muted\" x=\"1110\" y=\"520\">Container Insights<\u002Ftext>\n\n    <!-- Jenkins -> SNS (build result) -->\n    <path class=\"w-notify\" d=\"M 490 605 C 490 540, 1150 150, 1220 140\" marker-end=\"url(#arrow-notify)\"><\u002Fpath>\n\n    <!-- IAM to Jenkins (creds) -->\n    <path class=\"w-ci-dashed\" d=\"M 1200 140 C 900 300, 700 500, 560 620\" marker-end=\"url(#arrow-ci)\"><\u002Fpath>\n  <\u002Fsvg>\n\n  <div class=\"grid\">\n\n    <!-- End user -->\n    <div class=\"a-user stack\">\n      <div class=\"node\">\n        <div class=\"ico user\"><span class=\"material-icons\" style=\"font-size:18px;color:#fff\">person<\u002Fspan><\u002Fdiv>\n        <div class=\"body\">\n          <div class=\"t\">End user<\u002Fdiv>\n          <div class=\"s\">Browser client<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"node\">\n        <div class=\"ico github\"><span class=\"material-icons\" style=\"font-size:18px;color:#fff\">code<\u002Fspan><\u002Fdiv>\n        <div class=\"body\">\n          <div class=\"t\">GitHub<\u002Fdiv>\n          <div class=\"s\">StreamingApp repo<\u002Fdiv>\n          <div class=\"tag\">push → webhook<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ALB -->\n    <div class=\"a-alb\">\n      <div class=\"node\">\n        <div class=\"ico alb\"><span class=\"material-icons\" style=\"font-size:18px;color:#fff\">dns<\u002Fspan><\u002Fdiv>\n        <div class=\"body\">\n          <div class=\"t\">AWS Load Balancer<\u002Fdiv>\n          <div class=\"s\">LoadBalancer service · :80<\u002Fdiv>\n          <div class=\"tag\">frontend-service<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Aux services column (CloudWatch etc.) -->\n    <div class=\"a-aux stack\">\n      <div class=\"node\">\n        <div class=\"ico sns\"><span class=\"material-icons\" style=\"font-size:18px;color:#fff\">notifications<\u002Fspan><\u002Fdiv>\n        <div class=\"body\">\n          <div class=\"t\">Amazon SNS<\u002Fdiv>\n          <div class=\"s\">streaming-app-notifications<\u002Fdiv>\n          <div class=\"tag\">build success / failure<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"node\">\n        <div class=\"ico iam\"><span class=\"material-icons\" style=\"font-size:18px;color:#fff\">key<\u002Fspan><\u002Fdiv>\n        <div class=\"body\">\n          <div class=\"t\">IAM<\u002Fdiv>\n          <div class=\"s\">AWS credentials · ECR / EKS / SNS access<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- EKS Cluster (big block) -->\n    <div class=\"a-eks zone aws\">\n      <span class=\"zone-label\"><span class=\"dot\"><\u002Fspan>AWS · ap-south-1<\u002Fspan>\n      <div class=\"zone vpc\" style=\"padding:22px 16px 16px;\">\n        <span class=\"zone-label\"><span class=\"dot\"><\u002Fspan>VPC · 2× t3.medium worker nodes (scales 1–3)<\u002Fspan>\n\n        <div class=\"zone eks\" style=\"padding:22px 14px 14px;\">\n          <span class=\"zone-label\"><span class=\"dot\"><\u002Fspan>Amazon EKS cluster · Helm release <code style=\"font-family:var(--sf-font-mono,Menlo,monospace);background:#eaf1ff;padding:1px 6px;border-radius:4px;\">streaming-app<\u002Fcode><\u002Fspan>\n\n          <div class=\"k8s-inner\">\n            <div class=\"k8s-col\">\n              <h4>Frontend <span class=\"badge\">LoadBalancer · :80 · 2 pods<\u002Fspan><\u002Fh4>\n              <div class=\"row-nodes\" style=\"grid-template-columns:1fr\">\n                <div class=\"node\">\n                  <div class=\"ico fe\"><span class=\"material-icons\" style=\"font-size:18px;color:#fff\">movie<\u002Fspan><\u002Fdiv>\n                  <div class=\"body\">\n                    <div class=\"t\">streaming-frontend<\u002Fdiv>\n                    <div class=\"s\">React · Nginx · served on :80<\u002Fdiv>\n                    <div class=\"tag\">2× replicas<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <h4 style=\"margin-top:14px;\">Data <span class=\"badge\">ClusterIP · internal only<\u002Fspan><\u002Fh4>\n              <div class=\"node\">\n                <div class=\"ico mongo\"><span class=\"material-icons\" style=\"font-size:18px;color:#fff\">storage<\u002Fspan><\u002Fdiv>\n                <div class=\"body\">\n                  <div class=\"t\">MongoDB<\u002Fdiv>\n                  <div class=\"s\">:27017 · 1 pod · shared models in backend/common<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div class=\"k8s-col\">\n              <h4>Backend microservices <span class=\"badge\">ClusterIP · 2 pods each<\u002Fspan><\u002Fh4>\n              <div class=\"row-nodes\">\n                <div class=\"node\">\n                  <div class=\"ico auth\"><span class=\"material-icons\" style=\"font-size:16px;color:#fff\">lock<\u002Fspan><\u002Fdiv>\n                  <div class=\"body\">\n                    <div class=\"t\">auth<\u002Fdiv>\n                    <div class=\"s\">JWT · :3001<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div class=\"node\">\n                  <div class=\"ico stream\"><span class=\"material-icons\" style=\"font-size:16px;color:#fff\">play_circle<\u002Fspan><\u002Fdiv>\n                  <div class=\"body\">\n                    <div class=\"t\">streaming<\u002Fdiv>\n                    <div class=\"s\">catalog · :3002<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div class=\"node\">\n                  <div class=\"ico admin\"><span class=\"material-icons\" style=\"font-size:16px;color:#fff\">admin_panel_settings<\u002Fspan><\u002Fdiv>\n                  <div class=\"body\">\n                    <div class=\"t\">admin<\u002Fdiv>\n                    <div class=\"s\">uploads · :3003<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div class=\"node\">\n                  <div class=\"ico chat\"><span class=\"material-icons\" style=\"font-size:16px;color:#fff\">chat<\u002Fspan><\u002Fdiv>\n                  <div class=\"body\">\n                    <div class=\"t\">chat<\u002Fdiv>\n                    <div class=\"s\">Socket.IO · :3004<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"sub-muted\">Each backend pod talks to MongoDB via ClusterIP · none of these are publicly reachable.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Github -->\n    <div class=\"a-github\">\n      <div class=\"node\" style=\"min-height:66px;\">\n        <div class=\"ico github\"><span class=\"material-icons\" style=\"font-size:18px;color:#fff\">folder_open<\u002Fspan><\u002Fdiv>\n        <div class=\"body\">\n          <div class=\"t\">GitHub repo<\u002Fdiv>\n          <div class=\"s\">main branch · Jenkinsfile · Helm chart<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Jenkins on EC2 -->\n    <div class=\"a-jenkins\">\n      <div class=\"node\" style=\"min-height:66px;\">\n        <div class=\"ico jenkins\"><span class=\"material-icons\" style=\"font-size:18px;color:#fff\">engineering<\u002Fspan><\u002Fdiv>\n        <div class=\"body\">\n          <div class=\"t\">Jenkins on EC2 (t2.medium)<\u002Fdiv>\n          <div class=\"s\">Pipeline: Checkout → ECR login → Build 5 images (parallel) → Tag &amp; push<\u002Fdiv>\n          <div class=\"tag\">Jenkinsfile @ repo root<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ECR -->\n    <div class=\"a-ecr\">\n      <div class=\"node\" style=\"min-height:66px;\">\n        <div class=\"ico ecr\"><span class=\"material-icons\" style=\"font-size:18px;color:#fff\">inventory_2<\u002Fspan><\u002Fdiv>\n        <div class=\"body\">\n          <div class=\"t\">Amazon ECR<\u002Fdiv>\n          <div class=\"s\">5 repos · frontend / auth / streaming / admin / chat<\u002Fdiv>\n          <div class=\"tag\">:latest tag<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Monitoring -->\n    <div class=\"a-monitor\">\n      <div class=\"node\" style=\"min-height:66px;\">\n        <div class=\"ico cw\"><span class=\"material-icons\" style=\"font-size:18px;color:#fff\">monitoring<\u002Fspan><\u002Fdiv>\n        <div class=\"body\">\n          <div class=\"t\">Amazon CloudWatch<\u002Fdiv>\n          <div class=\"s\">Container Insights · control-plane logs · CPU / memory alarms<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <div class=\"legend\">\n    <span class=\"lg\"><span class=\"sw user\"><\u002Fspan>User traffic (HTTPS → LoadBalancer → pods)<\u002Fspan>\n    <span class=\"lg\"><span class=\"sw ci\"><\u002Fspan>CI pipeline (build &amp; push)<\u002Fspan>\n    <span class=\"lg\"><span class=\"sw ci-d\"><\u002Fspan>Image pull / credentials<\u002Fspan>\n    <span class=\"lg\"><span class=\"sw data\"><\u002Fspan>Internal ClusterIP (service ↔ Mongo)<\u002Fspan>\n    <span class=\"lg\"><span class=\"sw mon\"><\u002Fspan>Telemetry &amp; notifications<\u002Fspan>\n  <\u002Fdiv>\n\n  <div class=\"steps\">\n    <div class=\"step build\">\n      <div class=\"num\">01 · BUILD<\u002Fdiv>\n      <div class=\"title\">Push triggers Jenkins<\u002Fdiv>\n      <div class=\"body\">GitHub webhook hits Jenkins on EC2; pipeline checks out <code>main<\u002Fcode> and logs into ECR via IAM credentials.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"step ship\">\n      <div class=\"num\">02 · SHIP<\u002Fdiv>\n      <div class=\"title\">5 images → ECR<\u002Fdiv>\n      <div class=\"body\">Frontend, auth, streaming, admin, chat built in parallel, tagged against the ECR registry, and pushed as <code>:latest<\u002Fcode>.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"step run\">\n      <div class=\"num\">03 · RUN<\u002Fdiv>\n      <div class=\"title\">EKS pulls &amp; runs<\u002Fdiv>\n      <div class=\"body\">Helm chart deploys 2 replicas per service behind ClusterIP; frontend is exposed via a LoadBalancer on :80. MongoDB runs in-cluster.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"step watch\">\n      <div class=\"num\">04 · WATCH<\u002Fdiv>\n      <div class=\"title\">Telemetry &amp; alerts<\u002Fdiv>\n      <div class=\"body\">CloudWatch Container Insights collects CPU/memory; alarms fire on thresholds. Jenkins publishes build status to SNS.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"foot\">Sources · <code>StreamingApp/docs/ARCHITECTURE.md<\u002Fcode>, <code>StreamingApp/docs/DEPLOYMENT.md<\u002Fcode>, <code>StreamingApp/Jenkinsfile<\u002Fcode><\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fdiv>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
